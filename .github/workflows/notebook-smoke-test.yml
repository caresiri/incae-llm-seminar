name: notebook-smoke-test

on:
  push:
    paths:
      - "notebooks/**"
      - "scripts/notebook_smoke_test.py"
      - ".github/workflows/notebook-smoke-test.yml"
  pull_request:
    paths:
      - "notebooks/**"
      - "scripts/notebook_smoke_test.py"
      - ".github/workflows/notebook-smoke-test.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbformat
      - name: Validate notebooks
        run: python scripts/notebook_smoke_test.py
